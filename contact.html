            <div class="contact-grid">
                
                <div class="contact-form-section">
                    <h2 class="section-title mb-spacing">Let's Talk</h2>
                    
                    <form action="https://formspree.io/f/mwvrdwkq" method="POST" class="custom-form">
                        
                        <div class="input-group">
                            <label for="name">Your Name *</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        
                        <div class="input-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        
                        <div class="input-group">
                            <label for="message">Message *</label>
                            <textarea id="message" name="message" rows="4" required></textarea>
                        </div>
                        
                        <button type="submit" class="btn-outline" style="width: max-content; margin-top: 1rem;">Send Message</button>
                    </form>
                </div>

                <div class="contact-info-section">
                    <h2 class="section-title mb-spacing">Contact Info</h2>

                    </div>
